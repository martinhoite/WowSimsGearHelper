name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
      CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
      CURSEFORGE_GAME_VERSION_IDS: ${{ vars.CURSEFORGE_GAME_VERSION_IDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_TYPE="release"
          PRERELEASE="false"

          if [[ "$VERSION" == *"-alpha."* ]]; then
            RELEASE_TYPE="alpha"
            PRERELEASE="true"
          elif [[ "$VERSION" == *"-beta."* ]] || [[ "$VERSION" == *"-rc."* ]]; then
            RELEASE_TYPE="beta"
            PRERELEASE="true"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Validate release channel branch
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TYPE="${{ steps.meta.outputs.release_type }}"
          TAG_SHA="${GITHUB_SHA}"
          CONTAINING_BRANCHES="$(git branch -r --contains "$TAG_SHA" | sed 's/^[* ]*//')"

          echo "Branches containing ${GITHUB_REF_NAME}:"
          printf '%s\n' "$CONTAINING_BRANCHES"

          case "$RELEASE_TYPE" in
            alpha)
              if ! printf '%s\n' "$CONTAINING_BRANCHES" | grep -Eq '^origin/feature/'; then
                echo "Alpha tags must point to a commit on a feature/* branch."
                exit 1
              fi
              ;;
            beta)
              if ! printf '%s\n' "$CONTAINING_BRANCHES" | grep -Eq '^origin/release/'; then
                echo "Beta tags must point to a commit on a release/* branch."
                exit 1
              fi
              ;;
            release)
              if ! printf '%s\n' "$CONTAINING_BRANCHES" | grep -Eq '^origin/main$'; then
                echo "Stable release tags must point to a commit on main."
                exit 1
              fi
              ;;
            *)
              echo "Unknown release type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

      - name: Build addon zip
        id: package
        shell: bash
        run: |
          set -euo pipefail

          ADDON_DIR="WowSimsGearHelper"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP_NAME="${ADDON_DIR}-${VERSION}.zip"

          mkdir -p dist "${ADDON_DIR}"

          # Build package from tracked files while honoring .gitattributes export-ignore.
          git archive --format=tar --worktree-attributes HEAD | tar -x -C "${ADDON_DIR}"
          zip -r "dist/${ZIP_NAME}" "${ADDON_DIR}"

          echo "artifact=dist/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release note bodies
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          GITHUB_CHANGELOG_BLOCK="$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; print; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
          ' CHANGELOG.md)"

          if [[ -z "$GITHUB_CHANGELOG_BLOCK" ]]; then
            GITHUB_CHANGELOG_BLOCK="$(awk '
              $0 ~ "^## \\[" { if (seen_header == 0) { seen_header=1; in_section=1; print; next } else if (in_section) { exit } }
              in_section { print }
            ' CHANGELOG.md)"
          fi

          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\. ]]; then
            MINOR_KEY="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          else
            MINOR_KEY="$(echo "$VERSION" | cut -d. -f1-2)"
          fi

          CURSEFORGE_CHANGELOG_BLOCK="$(awk -v m="$MINOR_KEY" '
            /^## \[/ {
              in_section=0
              if ($0 ~ ("^## \\[" m "\\.")) {
                in_section=1
                matched=1
              }
            }
            in_section { print }
            END {
              if (!matched) {
                exit 1
              }
            }
          ' CHANGELOG.md || true)"

          if [[ -z "$CURSEFORGE_CHANGELOG_BLOCK" ]]; then
            CURSEFORGE_CHANGELOG_BLOCK="$GITHUB_CHANGELOG_BLOCK"
          fi

          if [[ -z "$GITHUB_CHANGELOG_BLOCK" ]]; then
            GITHUB_CHANGELOG_BLOCK="Release ${VERSION}"
          fi
          if [[ -z "$CURSEFORGE_CHANGELOG_BLOCK" ]]; then
            CURSEFORGE_CHANGELOG_BLOCK="Release ${VERSION}"
          fi

          FULL_CHANGELOG_URL="https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md"
          CURSEFORGE_CHANGELOG_BLOCK="$(printf '[Full changelog](%s)\n\n%s' "$FULL_CHANGELOG_URL" "$CURSEFORGE_CHANGELOG_BLOCK")"

          {
            echo "github_body<<EOF"
            echo "$GITHUB_CHANGELOG_BLOCK"
            echo "EOF"
            echo "curseforge_body<<EOF"
            echo "$CURSEFORGE_CHANGELOG_BLOCK"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact }}
          body: ${{ steps.changelog.outputs.github_body }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}

      - name: Publish to CurseForge
        if: ${{ env.CURSEFORGE_API_TOKEN != '' && env.CURSEFORGE_PROJECT_ID != '' && env.CURSEFORGE_GAME_VERSION_IDS != '' }}
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ env.CURSEFORGE_API_TOKEN }}
          project_id: ${{ env.CURSEFORGE_PROJECT_ID }}
          game_endpoint: wow
          file_path: ${{ steps.package.outputs.artifact }}
          game_versions: ${{ env.CURSEFORGE_GAME_VERSION_IDS }}
          changelog: ${{ steps.changelog.outputs.curseforge_body }}
          changelog_type: markdown
          release_type: ${{ steps.meta.outputs.release_type }}
